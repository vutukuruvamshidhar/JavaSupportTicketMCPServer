spring.application.name=SupportTicketMCPServer

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:clientdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:company_database_init.sql

# Ticketing REST API base URL (stubbed for tests)
ticketing.api.base-url=http://localhost

# Keycloak (stubbed for tests — real calls are mocked via TestConfig)
keycloak.server-url=http://localhost:8080
keycloak.realm=test-realm
keycloak.client-id=test-client
keycloak.client-secret=test-secret