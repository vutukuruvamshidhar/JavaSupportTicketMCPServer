spring.application.name=SupportTicketMCPServer
server.port=${PORT:80}
server.address=0.0.0.0

#spring.autoconfigure.exclude=org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration,org.springframework.cloud.commons.util.InetUtilsAutoConfiguration
#
#spring.cloud.discovery.enabled=false
#eureka.client.enabled=false
#spring.cloud.inetutils.ignoredInterfaces=.*
#spring.cloud.inetutils.useOnlySiteLocalInterfaces=true
#spring.cloud.inetutils.preferredNetworks=127.*
#spring.cloud.service-registry.auto-registration.enabled=false



# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:clientdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# Run client_database_init.sql on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:company_database_init.sql

# Azure Entra ID (Microsoft Graph) - app registration credentials
azure.entra.tenant-id=${AZURE_TENANT_ID:}
azure.entra.client-id=${AZURE_CLIENT_ID:}
azure.entra.client-secret=${AZURE_CLIENT_SECRET:}

# Ticketing REST API base URL
ticketing.api.base-url=https://javamocksupportticketapi-b2cxhxahaadwg2fw.westeurope-01.azurewebsites.net/servicenow