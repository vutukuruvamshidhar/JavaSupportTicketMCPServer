# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:clientdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# Run client_database_init.sql on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:company_database_init.sql

# Ticketing REST API base URL
#ticketing.api.base-url=https://javamocksupportticketapi-b2cxhxahaadwg2fw.westeurope-01.azurewebsites.net/servicenow
ticketing.api.base-url=http://localhost:9090/servicenow

# OAuth 2.1 Resource Server – validate incoming JWTs against Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/mcp-poc

# Keycloak client credentials for assignee lookup
